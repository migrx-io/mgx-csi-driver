driverName: csi.migrx.io

image:
  mgxcsi:
    repository: migrx/mgx-csi-driver
    tag: latest
    pullPolicy: IfNotPresent
  csiProvisioner:
    repository: registry.k8s.io/sig-storage/csi-provisioner
    tag: v6.0.0
    pullPolicy: IfNotPresent
  csiResizer:
    repository: registry.k8s.io/sig-storage/csi-resizer
    tag: v2.0.0
    pullPolicy: IfNotPresent
  csiAttacher:
    repository: registry.k8s.io/sig-storage/csi-attacher
    tag: v4.7.0
    pullPolicy: IfNotPresent
  nodeDriverRegistrar:
    repository: registry.k8s.io/sig-storage/csi-node-driver-registrar
    tag: v2.15.0
    pullPolicy: IfNotPresent
  csiSnapshotter:
    repository: registry.k8s.io/sig-storage/csi-snapshotter
    tag: v8.4.0
    pullPolicy: IfNotPresent
  externalSnapshotter:
    repository: registry.k8s.io/sig-storage/snapshot-controller
    tag: v8.4.0
    pullPolicy: IfNotPresent

serviceAccount:
  # Specifies whether a serviceAccount should be created
  create: true

rbac:
  # Specifies whether RBAC resources should be created
  create: true

storageclass:
  # Specifies whether  should be created
  create: true

  # Custom labels (optional)
  # labels: "storage=mgx"

  # Cache size parameters (in MB)
  # minCacheRCacheSize: "1024"
  # minCacheRWCacheSize: "1024"
  # maxCacheRCacheSize: "131072"
  # maxCacheRWCacheSize: "10240"

  # Cache ratio parameters
  # ratioCacheRCacheSize: "0.05"
  # ratioCacheRWCacheSize: "0.1"

  # qosRMBPerSec: "0"
  # qosWMBPerSec: "0"
  # qosRWIOPS: "0"

  # storageEncryptSecret: ""  # name of secret if encryption is enabled
  # storageCompress: ""       # "0" to "9"

  # reclaimPolicy: Delete     # Delete or Retain

externallyManagedSecret:
  # Specifies whether a externallyManagedConfigmap should be created
  create: true 

controller:
  replicas: 1
  nodeSelector: {}
  tolerations: {}
  timeoutVolumeCheck: 10
  idleVolumeMin: 5

node:
  nodeSelector: {}
  tolerations:
    - operator: "Exists"
  nrIoQueues: 2
  queueSize: 16
  # NVMe-oF connection timeouts (seconds) passed to `nvme connect`.
  # fastIoFailTmo: how long the host queues I/O on a lost controller before
  #   failing fast with EIO. 0 = fail immediately on any controller fault.
  # ctrlLossTmo: how long the host keeps retrying reconnect before removing
  #   the controller permanently. Should be >= fastIoFailTmo.
  # reconnectDelay: pause between reconnect attempts.
  # keepAliveTmo: keep-alive timeout; the controller is considered lost if
  #   no keep-alive is received within this window.
  fastIoFailTmo: 0
  ctrlLossTmo: 10
  reconnectDelay: 2
  keepAliveTmo: 5
  # nvmeTimeout: shared deadline (seconds) for `nvme connect` / `nvme
  #   disconnect` shell-outs and for the post-disconnect waits for the
  #   kernel subsystem entry and /dev/disk/by-id symlink to clear. If any
  #   step exceeds this, the op fails and volume_clean is skipped.
  nvmeTimeout: 30
  # mkfsFsckTimeout: per-command deadline (seconds) applied to every
  # shell-out that SafeFormatAndMount makes (fsck, mkfs, mount). Guards
  # against a stuck NVMe-oF device wedging NodePublishVolume forever.
  mkfsFsckTimeout: 120
  # volume_clean polling (seconds). After unmounting on pod restart the node
  # calls storage.volume_clean and waits for volume_get to report READY before
  # returning. volumeCleanPollInterval is the gap between GetVolume probes;
  # volumeCleanReadyTimeout is the total wall-clock budget before unpublish
  # fails and kubelet retries.
  # volumeCleanEnabled: set to true to call the storage.volume_clean RPC on
  # NodeUnpublishVolume and wait for READY. Disabled by default — the node
  # only unmounts in that case.
  volumeCleanEnabled: false
  volumeCleanPollInterval: 2
  volumeCleanReadyTimeout: 60

# The single snapshot controller deployment works for all CSI drivers
# in a cluster. So enable it only if you kubernetes cluster does not
# have a snapshot controller
externalSnapshotter:
  enabled: false
  name: snapshot-controller
  priorityClassName: system-cluster-critical
  controller:
    replicas: 1
  resources:
    limits:
      memory: 300Mi
    requests:
      cpu: 10m
      memory: 20Mi
  # Create volume snapshot CRDs.
  customResourceDefinitions:
    # if set true, VolumeSnapshot, VolumeSnapshotContent and
    # VolumeSnapshotClass CRDs will be created.
    enabled: true

# Configuration for the csiSecret
csiSecret:
  clusterConfig:
    protocol: http
    nodes:
      - localhost:8082
    cluster: main
    ns: main
    username: ""
    password: ""
